name: Deploy Digital Twin

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Authenticate Docker
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev

      - name: Build and Push
        run: |
          TAG=$(date +%s)
          IMAGE=europe-west4-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/digitaltwin/api:$TAG
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy digitaltwin-api \
            --image $IMAGE \
            --region europe-west4 \
            --platform managed \
            --allow-unauthenticated \
            --service-account 1077222074735-compute@developer.gserviceaccount.com \
            --set-env-vars GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --timeout 300 \
            --port 8080 \
            --memory 1Gi \
            --cpu 1

      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase use ${{ secrets.FIREBASE_PROJECT_ID }}
          firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
