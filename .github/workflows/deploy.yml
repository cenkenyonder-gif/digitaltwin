name: Deploy Digital Twin

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -------------------------------------------------
      # 0️⃣ Checkout the repository
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 1️⃣ Authenticate to Google Cloud
      # -------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # -------------------------------------------------
      # 2️⃣ Install the gcloud SDK
      # -------------------------------------------------
      - name: Install Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # -------------------------------------------------
      # 3️⃣ Authenticate Docker to Artifact Registry
      # -------------------------------------------------
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev

      # -------------------------------------------------
      # 4️⃣ Build Docker image
      # -------------------------------------------------
      - name: Build Docker image
        run: |
          IMAGE=europe-west4-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/digitaltwin/api:$(date +%s)
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # -------------------------------------------------
      # 5️⃣ Deploy to Cloud Run
      # -------------------------------------------------
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy digitaltwin-api \
            --image $IMAGE \
            --region europe-west4 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --service-account 1077222074735-compute@developer.gserviceaccount.com

      # -------------------------------------------------
      # 6️⃣ Deploy Firebase Hosting
      # -------------------------------------------------
      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase use ${{ secrets.FIREBASE_PROJECT_ID }}
          firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
