<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Digital Twin</title>
</head>

<body>
  <h1>Digital Twin Chat</h1>
  <input id="msg" placeholder="Type a message…" />
  <button onclick="send()">Send</button>
  <pre id="out"></pre>
  <script>
    async function send() {
      const txt = document.getElementById('msg').value;
      const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: txt }) });
      const data = await res.json();
      document.getElementById('out').textContent = data.reply || data.error || JSON.stringify(data);
    }
  </script>
</body>

</html>
